# fly.toml app configuration file generated for wogibteskurse on 2026-04-23T13:09:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wogibteskurse'
primary_region = 'fra'

[build]

[[mounts]]
  source = 'data'
  destination = '/app/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    path = '/api/health'
    timeout = '5s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
